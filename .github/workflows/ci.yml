# Phase 15 — CI matrix workflow (TEST-05, D-97).
#
# Builds the wheel, pip-installs it (NOT editable — proves the wheel + console
# script work for a real user), runs `zai-codex-helper --help` (exit 0), then
# pip-installs `.[dev]` and runs `pytest -m "not e2e"` (unit + integration +
# smoke). e2e is EXCLUDED — it needs a live ZAI_API_KEY + a running Moon Bridge
# (TEST-04, local-only). Run e2e locally with:
#
#   pytest -m e2e tests/test_e2e_live.py
#
# Matrix: Python 3.10-3.13 x macos-latest/ubuntu-latest. macOS covers the
# launchctl/service paths; ubuntu covers the cross-platform logic (service
# commands gate on darwin). Windows is out of scope (CLAUDE.md Constraints).

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build the wheel
        run: python -m build

      - name: Install the built wheel (NOT editable)
        # D-97 load-bearing: install dist/*.whl, NOT `pip install -e .` — this
        # proves the wheel + the [project.scripts] console script work for a
        # real pip user (a misconfigured wheel fails here, before archive).
        run: pip install dist/*.whl

      - name: Verify the console script is invokable (--help exits 0)
        # Runs BEFORE `.[dev]` is installed so dev deps are NOT required for
        # --help (a real user with just the wheel must be able to get help).
        run: zai-codex-helper --help

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Run the test suite (e2e EXCLUDED — local-only per TEST-04)
        # TEST-05 gate: e2e needs a live ZAI_API_KEY + running Moon Bridge.
        run: pytest -m "not e2e"
